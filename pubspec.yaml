name: kinetic_solutions
description: Kinetic Solutions Limited — Business Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & local DB
  flutter_bloc: ^8.1.6
  hive_flutter: ^1.1.0

  # Unique IDs
  uuid: ^4.5.1

  # Charts
  fl_chart: ^0.70.2

  # HTTP
  dio: ^5.7.0

  # Camera / image picker (for stock photo entry)
  image_picker: ^1.1.2

  # Barcode / QR scanning
  mobile_scanner: ^5.2.3

  # File operations
  path_provider: ^2.1.4

  # Shimmer loading skeletons
  shimmer: ^3.0.0

  # Intl / formatting
  intl: ^0.19.0

  # ── ADD THIS LINE ──
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true